<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Duck</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 40px 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            margin: 0 auto;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <label>Id:</label>
        <input id="duckId" type="number"/>
        <label>Type:</label>
        <input id="duckType" />
        <label>Image:</label>
        <input id="imageInput" type="file" accept="image/*"/>
        <button onclick="addTheDuck()">Add the duck</button>
    </div>

    <script>
        let host = "https://ducks-service-latest-2-87ex.onrender.com";

        async function addTheDuck() {
            let message = "";
            let duckId = document.getElementById("duckId").value;
            let duckType = document.getElementById("duckType").value;
            let duck = { id: duckId, type: duckType };
            console.log("You entered: " + JSON.stringify(duck));

            let request = {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(duck)
            };

            let response = await fetch(host + "/ducks", request);
            if (response.status == 200) {
                let result = await submitTheImage();
                if (result) {
                    message = "The duck was added successfully!";
                } else {
                    message = "Something went wrong! Data was saved but image was not saved.";
                }
            } else {
                console.log(response);
                message = "Something went wrong! Duck data could not be saved.";
            }
            alert(message);
        }

        async function submitTheImage() {
            let duckId = document.getElementById("duckId").value;
            let imageInput = document.getElementById("imageInput");
            let formData = new FormData();
            formData.append("file", imageInput.files[0]);
            let request = {
                method: "POST",
                body: formData
            };
            let response = await fetch(host + "/ducks/" + duckId + "/image", request);
            let result = await response.json();
            return result;
        }
    </script>
</body>
</html>
