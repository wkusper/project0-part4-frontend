<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search ducks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 30px 20px;
        }

        .search-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 0 auto;
        }

        label {
            display: inline-block;
            margin-right: 10px;
            color: #333;
            font-weight: bold;
        }

        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            margin-right: 10px;
        }

        input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        table {
          border-collapse: collapse;
          width: 100%;
          margin-top: 30px;
        }

        table th {
          background-color: #4CAF50;
          color: white;
          padding: 12px;
          text-align: left;
          font-weight: bold;
        }

        table td {
          border-bottom: 1px solid #ddd;
          padding: 12px;
        }

        table tr:hover {
          background-color: #f9f9f9;
        }
    </style>
</head>
<body>
<div class="search-container">
<label>Type:</label>
<input id="type" />
<button onclick="search()">Search</button>
<table>
    <thead>
    <tr>
        <th>Id</th>
        <th>Type</th>
    </tr>
    </thead>
    <tbody id="result">

    </tbody>

</table>
</div>

<script>
    let ducks = [];

    async function getAll() {
        let host = "https://ducks-service-latest-2-87ex.onrender.com";
        try {
            const response = await fetch(`${host}/ducks`);
            ducks = await response.json();
        } catch (error) {
            console.error("Error fetching ducks:", error);
        }
    }

    function search() {
        let duckType = document.getElementById("type").value;
        let table = document.getElementById("result");
        table.innerHTML = "";
        for (let duck of ducks) {
            if (!duckType || duck.type === duckType) {
                let row = document.createElement("tr");
                let cell1 = document.createElement("td");
                let id = document.createTextNode(duck.id);
                cell1.appendChild(id);
                row.appendChild(cell1);
                
                let cell2 = document.createElement("td");
                let type = document.createTextNode(duck.type);
                cell2.appendChild(type);
                row.appendChild(cell2);
                
                table.appendChild(row);
            }
        }
    }

    getAll();
</script>


</body>
</html>
